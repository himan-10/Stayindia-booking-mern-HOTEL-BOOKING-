version: '3.8'

services:
  backend:
    build: ./backend
    container_name: luxrentals_backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/rental-portal
      - JWT_SECRET=supersecret_jwt_key_prod_change_me
      - JWT_EXPIRE=30d
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - rental_network

  frontend:
    build: ./frontend
    container_name: luxrentals_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rental_network

  mongodb:
    image: mongo:latest
    container_name: luxrentals_mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - rental_network

networks:
  rental_network:
    driver: bridge

volumes:
  mongodb_data:
